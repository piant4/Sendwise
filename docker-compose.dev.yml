services:
  backend:
    volumes:
      - ./templates/dist:/templates/dist:ro

  listmonk:
    environment:
      LISTMONK_smtp__enabled: "true"
      LISTMONK_smtp__host: ${SMTP_HOST}
      LISTMONK_smtp__port: ${SMTP_PORT}
      LISTMONK_smtp__username: ${SMTP_USERNAME}
      LISTMONK_smtp__password: ${SMTP_PASSWORD}
      LISTMONK_smtp__tls_enabled: ${SMTP_TLS}
    depends_on:
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    # Dev/staging only. Do not include Mailpit in production sending.
