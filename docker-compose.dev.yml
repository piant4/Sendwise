services:
  backend:
    environment:
      EMAIL_SENDING_ENABLED: "false"
      EMAIL_PROVIDER: "mailpit"
      REAL_SEND_ALLOWED_RECIPIENTS: ""
      REAL_SEND_REQUIRE_ALLOWED_RECIPIENTS: "true"
      REAL_SEND_MAX_RECIPIENTS: "0"
      REAL_SEND_CONFIRMATION_TOKEN: ""
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      SMTP_FROM_EMAIL: sendwise-local@example.test
    volumes:
      - ./templates/dist:/templates/dist:ro

  listmonk:
    environment:
      LISTMONK_smtp__enabled: "true"
      LISTMONK_smtp__host: mailpit
      LISTMONK_smtp__port: "1025"
      LISTMONK_smtp__username: ""
      LISTMONK_smtp__password: ""
      LISTMONK_smtp__tls_enabled: "false"
      LISTMONK_app__from_email: sendwise-local@example.test
    depends_on:
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    # Dev/staging only. Do not include Mailpit in production sending.
