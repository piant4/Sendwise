services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-email_ai}
      POSTGRES_USER: ${POSTGRES_USER:-email_ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-email_ai_platform}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_API_KEY: ${BACKEND_API_KEY:-change_me}
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-email_ai}
      POSTGRES_USER: ${POSTGRES_USER:-email_ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      CLERK_ISSUER: ${CLERK_ISSUER:-https://your-clerk-instance.clerk.accounts.dev}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      CLERK_API_BASE_URL: ${CLERK_API_BASE_URL:-https://api.clerk.com/v1}
      AUTH_USER_MAPPINGS_JSON: ${AUTH_USER_MAPPINGS_JSON:-{"user_clerk_admin_id":{"email":"platform-admin@example.com","access_type":"platform_admin","status":"active"}}}
      EMAIL_SENDING_ENABLED: ${EMAIL_SENDING_ENABLED:-false}
      LISTMONK_URL: ${LISTMONK_URL:-http://listmonk:9000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      listmonk:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/login}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/auth/redirect}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL:-/login}
        NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/login}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/auth/redirect}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL:-/login}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  listmonk:
    image: listmonk/listmonk:latest
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER:-email_ai_user}
      LISTMONK_db__password: ${POSTGRES_PASSWORD:-change_me}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    # Production must protect listmonk admin access. listmonk is engine only.

volumes:
  postgres_data:
