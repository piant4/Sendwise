  <body style="word-spacing:normal;background-color:#f3efe8;">

      <div aria-label="{{subject}}" aria-roledescription="email" style="background-color:#f3efe8;" role="article" lang="und" dir="auto">

          <tr>
            <td style="vertical-align:top;padding:0;">

        <tbody>
          
              <tr>
                <td align="left" style="font-size:0px;padding:10px 25px;padding-bottom:10px;word-break:break-word;">
                  
      <div style="font-family:Arial, Helvetica, sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;line-height:24px;text-align:left;text-transform:uppercase;color:#7c2d12;">Follow-up template</div>
    
                </td>
              </tr>
            
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:0;word-break:break-word;">

                </td>
              </tr>
            
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:10px 25px;padding-top:12px;word-break:break-word;">
                  
      <div style="font-family:Arial, Helvetica, sans-serif;font-size:14px;line-height:24px;text-align:left;color:#7c2d12;">{{preview_text}}</div>

        <tbody>
          
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:10px 25px;padding-bottom:10px;word-break:break-word;">
                  
      <div style="font-family:Arial, Helvetica, sans-serif;font-size:14px;line-height:24px;text-align:left;color:#9a3412;">Follow-up prepared for {{client_name}}</div>
    
                </td>
              </tr>
            
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:0;word-break:break-word;">
                  
      <div style="font-family:Arial, Helvetica, sans-serif;font-size:16px;line-height:24px;text-align:left;color:#374151;">{{body}}</div>
    
                </td>
              </tr>
            
        </tbody>

            </td>

        </tbody>
      </table>

        <tbody>
          <tr>
            <td style="vertical-align:top;padding:0;">
              
      <table border="0" cellpadding="0" cellspacing="0" role="presentation" style width="100%">
        <tbody>
          
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:10px 25px;padding-bottom:8px;word-break:break-word;">

                </td>
              </tr>
            
              <tr>
                <td align="left" class="dark-copy" style="font-size:0px;padding:0;word-break:break-word;">
                  
      <div style="font-family:Arial, Helvetica, sans-serif;font-size:12px;line-height:24px;text-align:left;color:#9a3412;">Unsubscribe link: <a href="{{unsubscribe_url}}" style="color: #9a3412;">{{unsubscribe_url}}</a></div>
    
                </td>
              </tr>
            
        </tbody>
      </table>
    
            </td>
          </tr>
        </tbody>
      </table>
    
      </div>

              </td>
