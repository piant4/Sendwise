services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ${SENDWISE_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ${SENDWISE_ENV_FILE:-.env}
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_API_BASE_URL: ${CLERK_API_BASE_URL}
      AUTH_USER_MAPPINGS_JSON: ${AUTH_USER_MAPPINGS_JSON}
      EMAIL_SENDING_ENABLED: ${EMAIL_SENDING_ENABLED}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      REAL_SEND_ALLOWED_RECIPIENTS: ${REAL_SEND_ALLOWED_RECIPIENTS}
      REAL_SEND_REQUIRE_ALLOWED_RECIPIENTS: ${REAL_SEND_REQUIRE_ALLOWED_RECIPIENTS}
      REAL_SEND_MAX_RECIPIENTS: ${REAL_SEND_MAX_RECIPIENTS}
      REAL_SEND_ENVIRONMENTS: ${REAL_SEND_ENVIRONMENTS}
      REAL_SEND_CONFIRMATION_TOKEN: ${REAL_SEND_CONFIRMATION_TOKEN}
      LISTMONK_URL: ${LISTMONK_URL}
      LISTMONK_USERNAME: ${LISTMONK_USERNAME}
      LISTMONK_PASSWORD: ${LISTMONK_PASSWORD}
      LISTMONK_TIMEOUT_SECONDS: ${LISTMONK_TIMEOUT_SECONDS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_TLS: ${SMTP_TLS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      AWS_SES_REGION: ${AWS_SES_REGION}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      UNSUBSCRIBE_TOKEN_SECRET: ${UNSUBSCRIBE_TOKEN_SECRET}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      listmonk:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL}
        NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        BACKEND_URL: ${BACKEND_URL}
    env_file:
      - ${SENDWISE_ENV_FILE:-.env}
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API}
      BACKEND_URL: ${BACKEND_URL}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  listmonk:
    image: listmonk/listmonk:latest
    command: ["sh", "-c", "./listmonk --install --yes --idempotent --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
    env_file:
      - ${SENDWISE_ENV_FILE:-.env}
    environment:
      LISTMONK_ADMIN_USER: ${LISTMONK_USERNAME}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_PASSWORD}
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_app__from_email: ${SMTP_FROM_EMAIL}
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
      LISTMONK_smtp__enabled: "true"
      LISTMONK_smtp__host: ${SMTP_HOST}
      LISTMONK_smtp__port: ${SMTP_PORT}
      LISTMONK_smtp__username: ${SMTP_USERNAME}
      LISTMONK_smtp__password: ${SMTP_PASSWORD}
      LISTMONK_smtp__tls_enabled: ${SMTP_TLS}
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    # Production must protect listmonk admin access. listmonk is engine only.

volumes:
  postgres_data:
